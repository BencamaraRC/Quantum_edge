apiVersion: v1
kind: ConfigMap
metadata:
  name: qe-config
  namespace: quantum-edge
data:
  REDIS_URL: "redis://${REDIS_ENDPOINT}:6379/0"
  DATABASE_URL: "postgresql+asyncpg://${DB_USERNAME}:${DB_PASSWORD}@${DB_ENDPOINT}/${DB_NAME}"
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
  SIGNAL_COLLECTION_TIMEOUT_S: "120"
  SMART_MONEY_TIMEOUT_S: "60"
  PASS1_THRESHOLD: "0.65"
  PASS2_THRESHOLD: "0.75"
  MAX_DAILY_LOSS_PCT: "6.0"
  MAX_POSITION_PCT: "5.0"
  MAX_CORRELATED_EXPOSURE_PCT: "15.0"
  ALPACA_BASE_URL: "https://paper-api.alpaca.markets"
  ALPACA_DATA_URL: "https://data.alpaca.markets"
