apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-07-smart-money
  namespace: quantum-edge
  labels:
    app: agent-07-smart-money
    component: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-07-smart-money
  template:
    metadata:
      labels:
        app: agent-07-smart-money
        component: agent
    spec:
      containers:
        - name: agent-07-smart-money
          image: ${ECR_AGENT_URL}:latest
          env:
            - name: AGENT_NAME
              value: agent_07_smart_money
            - name: AGENT_MODULE
              value: agents.agent_07_smart_money.main
          envFrom:
            - configMapRef:
                name: qe-config
            - secretRef:
                name: qe-secrets
          resources:
            requests:
              cpu: 128m
              memory: 256Mi
            limits:
              cpu: 256m
              memory: 512Mi
      restartPolicy: Always
