apiVersion: apps/v1
kind: Deployment
metadata:
  name: coordinator
  namespace: quantum-edge
  labels:
    app: coordinator
    component: coordinator
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: coordinator
  template:
    metadata:
      labels:
        app: coordinator
        component: coordinator
    spec:
      containers:
        - name: coordinator
          image: ${ECR_COORDINATOR_URL}:latest
          envFrom:
            - configMapRef:
                name: qe-config
            - secretRef:
                name: qe-secrets
          resources:
            requests:
              cpu: 256m
              memory: 512Mi
            limits:
              cpu: 512m
              memory: 1024Mi
      restartPolicy: Always
