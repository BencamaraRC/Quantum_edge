version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: quantum_edge
      POSTGRES_USER: qe_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qe_dev_password}
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
      - ./infrastructure/scripts/init_timescaledb.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qe_user -d quantum_edge"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis-data:
  timescaledb-data:
